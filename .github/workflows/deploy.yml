name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set environment variables in Vercel
        run: |
          echo "API keys are configured as GitHub Secrets"
          echo "Vercel will auto-deploy on push to main"
          echo "GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}"
          echo "GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}"
